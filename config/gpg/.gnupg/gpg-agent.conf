# GPG Agent Configuration

# Cache passphrase for 10 minutes, max 2 hours
default-cache-ttl 600
max-cache-ttl 7200

# Use macOS Keychain for passphrase storage
# Path assumes Apple Silicon Homebrew; Intel Macs use /usr/local/bin.
# doctor.sh validates this path at runtime.
pinentry-program /opt/homebrew/bin/pinentry-mac
