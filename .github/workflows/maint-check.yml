name: Maint Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  maint-check:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          brew install shellcheck biome

      - name: Run maintenance checks
        run: |
          make maint-check-ci

      - name: Run CI doctor checks
        run: |
          make doctor-ci

      - name: Biome check
        run: |
          biome check --no-errors-on-unmatched .
