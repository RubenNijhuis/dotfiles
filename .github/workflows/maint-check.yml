name: Maint Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  maint-check:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          brew install shellcheck biome

      - name: Run maintenance checks
        run: |
          make maint-check

      - name: Check docs freshness
        run: |
          bash scripts/docs/generate-cli-reference.sh --check

      - name: Check VS Code extension parity
        run: |
          bash scripts/health/check-vscode-parity.sh --check

      - name: Install dry-run
        run: |
          bash install.sh --dry-run --yes --profile personal --without-macos-defaults --without-ssh --without-gpg

      - name: Biome check
        run: |
          biome check --no-errors-on-unmatched .
