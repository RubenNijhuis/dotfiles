name: Maint Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  maint-check:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        timeout-minutes: 2

      - name: Install dependencies
        timeout-minutes: 10
        run: |
          brew install shellcheck biome shellharden

      - name: Run maintenance checks
        timeout-minutes: 5
        run: |
          make maint-check

      - name: Install dry-run
        timeout-minutes: 5
        run: |
          bash install.sh --dry-run --yes --without-macos-defaults --without-ssh --without-gpg

      - name: Lint Python
        timeout-minutes: 2
        run: |
          python3 -m py_compile lib/validate_launchd.py

      - name: Biome check
        timeout-minutes: 3
        run: |
          biome check --no-errors-on-unmatched .
